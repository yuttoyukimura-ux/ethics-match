<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>総合・倫理思想マッチング</title>
<style>
  body { font-family: "Hiragino Kaku Gothic ProN", "Meiryo", sans-serif; background-color: #f0f4f8; color: #333; margin: 0; padding: 15px; display: flex; justify-content: center; }
  .container { background: white; width: 100%; max-width: 600px; padding: 25px; border-radius: 12px; box-shadow: 0 8px 20px rgba(0,0,0,0.08); text-align: center; }
  h1 { font-size: 22px; color: #2c3e50; border-bottom: 3px solid #3498db; padding-bottom: 12px; margin-bottom: 20px;}
  h2 { font-size: 18px; color: #34495e; margin-bottom: 15px;}
  
  /* メニューボタンのベース */
  .menu-btn { display: block; width: 100%; padding: 14px; margin: 12px 0; font-size: 15px; font-weight: bold; cursor: pointer; border-radius: 8px; transition: 0.2s; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
  
  /* １．宗教用（ブルー系） */
  .btn-cat1 { background-color: #e0f7fa; border: 2px solid #4dd0e1; color: #006064; }
  .btn-cat1:hover { background-color: #00bcd4; color: white; border-color: #00bcd4; transform: translateY(-2px); }

  /* ２．規範倫理学用（グリーン系） */
  .btn-cat2 { background-color: #f1f8e9; border: 2px solid #aed581; color: #33691e; }
  .btn-cat2:hover { background-color: #8bc34a; color: white; border-color: #8bc34a; transform: translateY(-2px); }

  /* ３〜８．その他哲学用（オレンジ系） */
  .btn-others { background-color: #fff3e0; border: 2px solid #ffb74d; color: #e65100; }
  .btn-others:hover { background-color: #ff9800; color: white; border-color: #ff9800; transform: translateY(-2px); }

  /* クイズの選択肢ボタン（全体共通のブルー） */
  .choice-btn { display: block; width: 100%; padding: 14px; margin: 10px 0; font-size: 14px; cursor: pointer; border: 2px solid #3498db; border-radius: 8px; background-color: white; color: #3498db; font-weight: bold; transition: 0.2s; text-align: left; line-height: 1.5; }
  .choice-btn:hover { background-color: #3498db; color: white; }
  
  #question-text { font-size: 16px; margin: 15px 0; font-weight: bold; line-height: 1.5; text-align: left;}
  #question-number { color: #7f8c8d; font-size: 13px; font-weight: bold;}
  
  /* 画面切り替え（自動で全て非表示にし、active-screenだけ表示） */
  .container > div { display: none; }
  .active-screen { display: block !important; }

  .result-title { font-size: 26px; color: #e74c3c; margin: 10px 0; font-weight: bold;}
  .result-keywords { font-size: 13px; color: #2980b9; margin-bottom: 15px; font-weight: bold; background: #e8f4f8; padding: 10px; border-radius: 6px; text-align: left;}
  .result-desc { font-size: 14px; line-height: 1.7; text-align: left; background: #fdf2f0; padding: 15px; border-radius: 8px; margin-bottom: 20px;}
  
  .action-btn { background-color: #2c3e50; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-size: 15px; cursor: pointer; font-weight: bold; margin-bottom: 10px;}
  .dict-btn { background-color: #27ae60; color: white; border: none; padding: 14px; border-radius: 8px; width: 100%; font-size: 15px; cursor: pointer; font-weight: bold; margin-bottom: 10px;}
  
  .dict-item { background: #f8f9fa; border-left: 5px solid #3498db; padding: 12px; margin-bottom: 12px; text-align: left;}
  .dict-name { font-size: 16px; font-weight: bold; color: #2c3e50; margin: 0 0 5px 0;}
  .dict-key { font-size: 12px; color: #e67e22; margin: 0 0 8px 0; font-weight: bold;}
  .dict-text { font-size: 13px; line-height: 1.5; color: #555;}
  .dict-category-title { font-size: 20px; color: #2c3e50; border-bottom: 2px solid #bdc3c7; padding-bottom: 8px; margin-top: 10px; margin-bottom: 15px; text-align: left; font-weight: bold;}
</style>
</head>
<body>

<div class="container">
  <div id="home-screen" class="active-screen">
    <h1>📚 倫理思想マッチング</h1>
    <p style="font-size: 14px;">キミの考え方は、歴史上のどの思想家と同じ？<br>気になるカテゴリを選んで診断しよう！</p>
    
    <button class="menu-btn btn-cat1" onclick="startQuiz('religion')">１．宗教 match（5問）</button>
    <button class="menu-btn btn-cat2" onclick="startQuiz('normative')">２．規範倫理学 match（5問）</button>
    
    <button class="menu-btn btn-others" onclick="startQuiz('greek')">３．古代ギリシャ哲学 match（5問）</button>
    <button class="menu-btn btn-others" onclick="startQuiz('science')">４．近代科学 match（5問）</button>
    <button class="menu-btn btn-others" onclick="startQuiz('democracy')">５．民主社会と自由 match（5問）</button>
    <button class="menu-btn btn-others" onclick="startQuiz('existentialism')">６．人間性の回復 match（10問）</button>
    <button class="menu-btn btn-others" onclick="startQuiz('chinese')">７．中国思想 match（10問）</button>
    <button class="menu-btn btn-others" onclick="startQuiz('japanese')">８．日本思想 match（10問）</button>
    
    <hr style="margin: 25px 0; border: none; border-top: 2px dashed #bdc3c7;">
    
    <p style="font-size: 13px; color: #7f8c8d; margin-bottom: 10px;">👇 授業の復習や図鑑だけ見たい人はこちら</p>
    <button class="dict-btn" onclick="showDictionaryMenu()">📖 思想家図鑑を見る（ジャンル別）</button>
  </div>

  <div id="quiz-screen">
    <h2 id="category-title">カテゴリ名</h2>
    <p id="question-number"></p>
    <div id="question-text"></div>
    <div id="choices-container"></div>
  </div>

  <div id="result-screen">
    <h2>あなたにピッタリの思想は…</h2>
    <div class="result-title" id="result-name"></div>
    <div class="result-keywords" id="result-keywords"></div>
    <div class="result-desc" id="result-desc"></div>
    <button class="dict-btn" onclick="showDictionaryCategory(currentCategory)">📖 登場した思想家の図鑑を見る</button>
    <button class="action-btn" onclick="goHome()">🏠 トップメニューに戻る</button>
  </div>

  <div id="dictionary-menu-screen">
    <h1>📖 思想家図鑑</h1>
    <p style="font-size: 14px; margin-bottom: 20px;">復習したいジャンルを選んでください。</p>
    <button class="menu-btn btn-cat1" onclick="showDictionaryCategory('religion')">１．宗教</button>
    <button class="menu-btn btn-cat2" onclick="showDictionaryCategory('normative')">２．規範倫理学</button>
    <button class="menu-btn btn-others" onclick="showDictionaryCategory('greek')">３．古代ギリシャ哲学</button>
    <button class="menu-btn btn-others" onclick="showDictionaryCategory('science')">４．近代科学</button>
    <button class="menu-btn btn-others" onclick="showDictionaryCategory('democracy')">５．民主社会と自由</button>
    <button class="menu-btn btn-others" onclick="showDictionaryCategory('existentialism')">６．人間性の回復</button>
    <button class="menu-btn btn-others" onclick="showDictionaryCategory('chinese')">７．中国思想</button>
    <button class="menu-btn btn-others" onclick="showDictionaryCategory('japanese')">８．日本思想</button>
    
    <button class="action-btn" onclick="goHome()" style="margin-top: 25px;">🏠 トップに戻る</button>
  </div>

  <div id="dictionary-screen">
    <div id="dict-category-title" class="dict-category-title"></div>
    <p style="font-size: 13px; color: #7f8c8d; margin-bottom: 15px;">キーワードと結びつけて復習しよう！</p>
    <div id="dictionary-content"></div>
    
    <button class="dict-btn" onclick="showDictionaryMenu()" style="margin-top: 20px; background-color: #34495e;">◀ ジャンル選択に戻る</button>
    <button class="action-btn" onclick="goHome()">🏠 トップに戻る</button>
  </div>
</div>

<script>
  /* ====== 思想家図鑑データ ====== */
  const dictData = {
    buddhism: { category: "宗教", name: "仏教", keywords: "四諦 / 八正道 / 慈悲 / 縁起", desc: "すべてのものは繋がり合っていると考え、自分の心を見つめて苦しみを滅することを目指します。" },
    christianity: { category: "宗教", name: "キリスト教", keywords: "アガペー（神の愛） / 隣人愛 / 贖罪", desc: "神の無償の愛を信じ、見返りを求めずに他者を自分のように愛することを大切にします。" },
    islam: { category: "宗教", name: "イスラム教", keywords: "アッラー / 六信五行 / クルアーン", desc: "絶対的な神への服従を誓い、日常生活の中で定められた規律を厳格に守ることを重んじます。" },
    util: { category: "規範倫理学", name: "功利主義", keywords: "結果主義 / 快楽計算", desc: "動機よりも「結果としてどれだけ多くの人を幸せにできたか」を正しい行いの基準とします（ベンサム、ミルなど）。" },
    deontology: { category: "規範倫理学", name: "義務論", keywords: "動機主義 / 定言命法", desc: "結果や損得ではなく、「絶対に守るべき普遍的なルール」に従うこと自体を善とします（カント）。" },
    virtue: { category: "規範倫理学", name: "徳倫理学", keywords: "卓越性 / キャラクター", desc: "どんな行動をするかよりも、日々の習慣を通して「どんな立派な人間になるか」を重視します（アリストテレスなど）。" },
    socrates: { category: "古代ギリシャ哲学", name: "ソクラテス", keywords: "不知の自覚 / 問答法 / 徳 / 魂への配慮", desc: "自分が何も分かっていないことを自覚し、対話を通して真理を探求。魂をより良く生きることを最優先しました。" },
    plato: { category: "古代ギリシャ哲学", name: "プラトン", keywords: "理想主義 / イデア / エロース / 理性気概欲望知恵勇気節制正義", desc: "現実の不完全な世界ではなく、永遠に変わらない完璧な理想（イデア）への愛（エロース）を説いた理想主義者。" },
    aristotle: { category: "古代ギリシャ哲学", name: "アリストテレス", keywords: "現実主義 / 幸福（エウダイモニア） / 知性的徳 / 倫理的徳 / 正義と友愛", desc: "現実を観察し、極端を避けた「中庸」の行動を習慣化する（倫理的徳）ことで最高の目的である「幸福」を目指しました。" },
    bacon: { category: "近代科学", name: "フランシス・ベーコン", keywords: "知は力なり / 経験論 / 帰納法 / 実証 / イドラ", desc: "思い込み（イドラ）を排除し、実験や観察の事実から法則を導き出す「帰納法」を提唱。学問で自然を支配しようとしました。" },
    descartes: { category: "近代科学", name: "ルネ・デカルト", keywords: "われ思う、ゆえにわれあり / 合理論 / 演繹法 / 論証 / 方法的懐疑", desc: "すべてを徹底的に疑い（方法的懐疑）、残った「考えている自分の存在」を確実な土台として論理を組み立てる「演繹法」を提唱。" },
    hobbes: { category: "民主社会と自由", name: "トマス・ホッブズ", keywords: "万人の万人に対する闘争 / 社会契約", desc: "人間は自己保存のために争うと考え、平和のためには強力な国家権力に権利を譲り渡す必要があると主張しました。" },
    locke: { category: "民主社会と自由", name: "ジョン・ロック", keywords: "自然権 / 抵抗権 / 社会契約", desc: "人間は自由や財産を守る権利を持ち、政府がそれを侵害した場合は国民に「抵抗権」があるとし、民主主義の基礎を築きました。" },
    rousseau: { category: "民主社会と自由", name: "ジャン＝ジャック・ルソー", keywords: "一般意志 / 人民主権 / 社会契約", desc: "社会の構成員全員の共通の利益を目指す「一般意志」に従うことこそが、本当の自由と平等を回復する道だと主張しました。" },
    kant: { category: "民主社会と自由", name: "イマヌエル・カント", keywords: "自律 / 真の自由 / 人格 / 目的の国", desc: "自らの理性が立てた道徳法則に従う「自律」が真の自由であると主張。すべての人を「目的」として扱う社会を目指しました。" },
    hegel: { category: "民主社会と自由", name: "G.W.F.ヘーゲル", keywords: "法 / 道徳性 / 人倫 / 家族・市民社会・国家 / 弁証法", desc: "対立を乗り越える「弁証法」で歴史を説明。個人の自由と社会のルールが統合された「人倫」の中で真の自由が実現するとしました。" },
    bentham: { category: "民主社会と自由", name: "ジェレミ・ベンサム", keywords: "最大多数の最大幸福 / 功利主義", desc: "社会のメンバー全員の快楽の合計から苦痛の合計を引いた値が最大になるような行動や法律が「正しい」としました。" },
    mill: { category: "民主社会と自由", name: "J.S.ミル", keywords: "良心 / 質的功利主義 / 危害原則", desc: "快楽には「質」の違いがあるとし、他人に危害を加えない限り個人の自由は最大限尊重されるべきだと説きました。" },
    marx: { category: "人間性の回復", name: "カール・マルクス", keywords: "疎外された労働 / 上部構造 / 生産関係（下部構造） / 社会革命 / 唯物史観 / 共産主義", desc: "資本主義によって人間が労働の喜びを奪われている（疎外）と批判。経済の仕組み（下部構造）を変革する革命を説きました。" },
    kierkegaard: { category: "人間性の回復", name: "セーレン・キルケゴール", keywords: "主体的真理 / 実存 / 美的実存 / 倫理的実存 / 宗教的実存", desc: "客観的な事実よりも「私が命を懸けられる真理」を重視。絶望の果てに、神の前に立つ「宗教的実存」へと飛躍することを説きました。" },
    nietzsche: { category: "人間性の回復", name: "フリードリヒ・ニーチェ", keywords: "ニヒリズム / 神は死んだ / 超人", desc: "絶対的な価値（神）が崩壊した時代（ニヒリズム）において、自分の力で新しい価値を生み出し運命を愛する「超人」を理想としました。" },
    jaspers: { category: "人間性の回復", name: "カール・ヤスパース", keywords: "限界状況 / 超越者 / 実存的交わり", desc: "死や絶望などの壁（限界状況）にぶつかった時、他者と包み隠さず語り合う（実存的交わり）ことで真の自分に目覚めるとしました。" },
    heidegger: { category: "人間性の回復", name: "マルティン・ハイデッガー", keywords: "死への存在 / ひと（世人、ダス・マン）", desc: "世間の噂話に流される生き方（ダス・マン）を批判。自分が「いつか死ぬ存在」だと自覚することで、本来の自己を取り戻せるとしました。" },
    sartre: { category: "人間性の回復", name: "ジャン＝ポール・サルトル", keywords: "自由 / 実存は本質に先立つ / アンガジュマン", desc: "人間にあらかじめ決まった本質はなく、自らの行動で自分を創り上げると主張。自由の責任を引き受け、社会に参加すること（アンガジュマン）を説きました。" },
    confucius: { category: "中国思想", name: "孔子", keywords: "道 / 仁 / 礼 / 孝悌 / 君子 / 徳治主義", desc: "家族への愛（孝悌）を基礎とする思いやり（仁）と、それを形に表す作法（礼）を身につけた「君子」による道徳的な政治を理想としました。" },
    mencius: { category: "中国思想", name: "孟子", keywords: "四端 / 性善説 / 四徳", desc: "人間は生まれながらに善に向かう芽（四端）を持っているとする性善説を唱え、王道政治を主張しました。" },
    xunzi: { category: "中国思想", name: "荀子", keywords: "性悪説 / 礼治", desc: "人間は放っておけば欲望に流されるとする性悪説を唱え、後天的な学びや厳しいルール（礼）による矯正が必要だとしました。" },
    zhuxi: { category: "中国思想", name: "朱子", keywords: "理気二元論 / 性即理 / 窮理 / 居敬 / 格物致知", desc: "宇宙は法則（理）と物質（気）からなるとし、欲望を抑えて事物の道理を極める（格物致知）という厳格な学問を説きました。" },
    wangyangming: { category: "中国思想", name: "王陽明", keywords: "心即理 / 良知 / 致良知 / 知行合一", desc: "人間の心そのものが真理であるとし、生まれつき持つ道徳的判断力（良知）を信じ、知識と行動を一致させること（知行合一）を説きました。" },
    laozi: { category: "中国思想", name: "老子", keywords: "道（タオ） / 無為自然 / 柔弱謙下", desc: "人為的な道徳やルールを否定し、万物の根源である「道」に従って、水のようにしなやかに自然体で生きることを説きました。" },
    zhuangzi: { category: "中国思想", name: "荘子", keywords: "道（タオ） / 万物斉同 / 逍遥遊", desc: "善悪や美醜といった人間の小さな価値観（分別の知）を捨て、すべてのものは等しいという境地（万物斉同）で自由に遊ぶことを説きました。" },
    hanfeizi: { category: "中国思想", name: "韓非子", keywords: "法家 / 信賞必罰", desc: "人間の善意や道徳を信用せず、厳格な法律と明確なアメとムチ（信賞必罰）によって国を統治するべきだと主張しました。" },
    mozi: { category: "中国思想", name: "墨子", keywords: "兼愛 / 非攻", desc: "自分と他人の区別なく世界中の人を平等に愛すること（兼愛）を説き、侵略戦争を絶対悪（非攻）として否定した熱き平和主義者です。" },
    sunzi: { category: "中国思想", name: "孫子", keywords: "兵法 / 不戦而屈人の兵", desc: "戦争は国家の重大事であるとし、敵と味方を冷静に分析して「できれば戦わずして勝つ」ことを最上の戦略とした兵法家です。" },
    saicho: { category: "日本思想", name: "最澄", keywords: "仏性 / 天台宗", desc: "すべての生き物に仏になる性質（仏性）があると説き、比叡山延暦寺を開いて厳しい修行を重んじました。" },
    kukai: { category: "日本思想", name: "空海", keywords: "大日如来 / 密教 / 即身成仏", desc: "宇宙の真理そのものである大日如来と一体化し、この現実の肉体のままで仏になれる（即身成仏）という密教を説きました。" },
    honen: { category: "日本思想", name: "法然", keywords: "末法の世 / 南無阿弥陀仏 / 専修念仏", desc: "厳しい修行ができない末法の世において、ただひたすら「南無阿弥陀仏」と唱えること（専修念仏）で誰もが救われると説きました。" },
    shinran: { category: "日本思想", name: "親鸞", keywords: "絶対他力 / 悪人正機", desc: "自分の力ではなく完全に阿弥陀仏の力にすがる「絶対他力」を説き、自分の罪深さを自覚する者こそが救われる（悪人正機）としました。" },
    dogen: { category: "日本思想", name: "道元", keywords: "只管打座 / 心身脱落", desc: "悟りを得ようとする目的すら捨てて、ただひたすらに正しい姿勢で座り続けること（只管打座）を最高の修行としました。" },
    nichiren: { category: "日本思想", name: "日蓮", keywords: "南無妙法蓮華経 / 唱題 / 立正安国", desc: "法華経の題目（南無妙法蓮華経）を唱えることを重んじ、正しい教えを国に広めることで社会を救済しようと激しく活動しました。" },
    razan: { category: "日本思想", name: "林羅山", keywords: "朱子学 / 敬 / 上下定分の理", desc: "宇宙の秩序である理を人間社会にも当てはめ、厳格な身分秩序や上下関係（上下定分の理）を守ることが道徳だと説きました。" },

  /* ====== アプリの動作制御 ====== */
  let currentCategory = "";
  let currentQuestionIndex = 0;
  let currentScores = {};
  let currentMatchedId = "";

  function switchScreen(screenId) {
    document.querySelectorAll('.container > div').forEach(div => div.classList.remove('active-screen'));
    document.getElementById(screenId).classList.add('active-screen');
  }

  function startQuiz(categoryKey) {
    currentCategory = categoryKey;
    currentQuestionIndex = 0;
    currentScores = {};
    for(let key in quizData[categoryKey].scores) {
        currentScores[key] = 0;
    }
    document.getElementById("category-title").textContent = quizData[categoryKey].title;
    switchScreen("quiz-screen");
    showQuestion();
  }

  function showQuestion() {
    const data = quizData[currentCategory];
    const q = data.questions[currentQuestionIndex];
    document.getElementById("question-number").textContent = `Q${currentQuestionIndex + 1} / ${data.questions.length}`;
    document.getElementById("question-text").textContent = q.text;
    
    const choicesDiv = document.getElementById("choices-container");
    choicesDiv.innerHTML = "";
    q.choices.forEach(choice => {
      const btn = document.createElement("button");
      btn.className = "choice-btn";
      btn.textContent = choice.text;
      btn.onclick = () => selectAnswer(choice.scores);
      choicesDiv.appendChild(btn);
    });
  }

  function selectAnswer(scores) {
    for (const key in scores) {
      if(currentScores[key] !== undefined) currentScores[key] += scores[key];
    }
    currentQuestionIndex++;
    if (currentQuestionIndex < quizData[currentCategory].questions.length) {
      showQuestion();
    } else {
      showResult();
    }
  }

  function showResult() {
    let maxScore = -1;
    currentMatchedId = Object.keys(currentScores)[0]; 
    for (const [key, score] of Object.entries(currentScores)) {
      if (score > maxScore) { maxScore = score; currentMatchedId = key; }
    }
    
    const resultData = dictData[currentMatchedId];
    if(resultData) {
      document.getElementById("result-name").textContent = resultData.name;
      document.getElementById("result-keywords").innerHTML = "🔑 <span style='color:#e67e22'>キーワード:</span> " + resultData.keywords;
      document.getElementById("result-desc").innerHTML = resultData.desc.replace(/\n/g, '<br>');
    }
    
    switchScreen("result-screen");
  }

  function showDictionaryMenu() {
    switchScreen("dictionary-menu-screen");
  }

  function showDictionaryCategory(categoryKey) {
    const content = document.getElementById("dictionary-content");
    content.innerHTML = ""; 
    
    const catTitle = quizData[categoryKey].title.replace(" match", "");
    document.getElementById("dict-category-title").textContent = "▼ " + catTitle + "の思想家一覧";

    const currentCategoryKeys = Object.keys(quizData[categoryKey].scores);
    
    currentCategoryKeys.forEach(key => {
      const data = dictData[key];
      if (!data) return;

      const itemDiv = document.createElement("div");
      itemDiv.className = "dict-item";
      
      if (currentCategory === categoryKey && key === currentMatchedId) {
        itemDiv.style.borderLeftColor = "#e74c3c";
        itemDiv.style.backgroundColor = "#fdf2f0";
        itemDiv.innerHTML = `
          <div class="dict-name">${data.name} <span style="color:#e74c3c; font-size:12px;">(★あなたの結果)</span></div>
          <div class="dict-key">${data.keywords}</div>
          <div class="dict-text">${data.desc}</div>
        `;
      } else {
        itemDiv.innerHTML = `
          <div class="dict-name">${data.name}</div>
          <div class="dict-key">${data.keywords}</div>
          <div class="dict-text">${data.desc}</div>
        `;
      }
      content.appendChild(itemDiv);
    });
    
    switchScreen("dictionary-screen");
  }

  function goHome() { switchScreen("home-screen"); }
</script>
